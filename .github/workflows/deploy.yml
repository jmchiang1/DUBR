# Builds the static export and publishes it to GitHub Pages.
#
# This is the "GitHub Actions" Pages source, not the old "deploy from a branch"
# one — nothing is committed to gh-pages, the built ./out is uploaded straight to
# Pages as an artifact. Turn it on once, at:
#   Settings → Pages → Build and deployment → Source → GitHub Actions.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # So a failed deploy can be re-run without an empty commit.
  workflow_dispatch:

# The app is served from https://jmchiang1.github.io/DUBR/, so every asset and
# link it emits needs the /DUBR prefix. next.config.ts reads it from here.
env:
  NEXT_PUBLIC_BASE_PATH: /DUBR

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. A queued run is allowed to wait, but is not cancelled —
# cancelling mid-deploy can leave the site half-published.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
